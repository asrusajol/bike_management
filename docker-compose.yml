services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bikeuser
      POSTGRES_PASSWORD: bikepass
      POSTGRES_DB: bikedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bikeuser -d bikedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
