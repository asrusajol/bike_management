services:

  # ── Database ─────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bikeuser -d bikedb"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Bind to localhost only — external access not needed in production
    ports:
      - "0.0.0.0:5434:5432"

  # ── Cache / task queue ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --no-appendfsync-on-rewrite yes --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6679:6379"

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"
    # Mount uploads dir so receipt/photo files survive container restarts
    volumes:
      - uploads_data:/app/uploads

  # ── React frontend (nginx static) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty → axios uses relative /api/v1 URLs; nginx reverse proxy handles routing
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
